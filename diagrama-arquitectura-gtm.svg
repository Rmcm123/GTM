<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F7F8FA"/>

  <text x="600" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">
    Arquitectura del Sistema GTM
  </text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#5E6A7D">
    Frontend React + API NestJS + PostgreSQL
  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10V2Z" fill="#2563EB"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="80" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">
    Frontend
  </text>
  <text x="210" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2563EB">
    React + TypeScript
  </text>
  <text x="210" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    Vistas por rol
  </text>
  <text x="210" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    Formularios y paneles
  </text>

  <rect x="470" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">
    Backend
  </text>
  <text x="600" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2563EB">
    API NestJS
  </text>
  <text x="600" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    Controladores, servicios
  </text>
  <text x="600" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    DTO y reglas de negocio
  </text>

  <rect x="860" y="160" width="260" height="150" rx="12" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">
    Base de Datos
  </text>
  <text x="990" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2563EB">
    PostgreSQL
  </text>
  <text x="990" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    Clientes, vehículos
  </text>
  <text x="990" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5E6A7D">
    órdenes e inventario
  </text>

  <path d="M350 235H455" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="402" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#2563EB">
    HTTP / JSON
  </text>

  <path d="M740 235H845" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="792" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#2563EB">
    TypeORM
  </text>

  <rect x="150" y="410" width="900" height="235" rx="14" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2"/>
  <text x="600" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">
    Módulos principales implementados
  </text>

  <rect x="210" y="500" width="160" height="80" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="290" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1E3A8A">
    Clientes
  </text>
  <text x="290" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B4A60">
    Registro y consulta
  </text>

  <rect x="410" y="500" width="160" height="80" rx="10" fill="#ECFDF5" stroke="#BBF7D0"/>
  <text x="490" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#166534">
    Vehículos
  </text>
  <text x="490" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B4A60">
    Asociación a cliente
  </text>

  <rect x="610" y="500" width="160" height="80" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="690" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#9A3412">
    Órdenes
  </text>
  <text x="690" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B4A60">
    Creación y estados
  </text>

  <rect x="810" y="500" width="160" height="80" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="890" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#334155">
    Inventario
  </text>
  <text x="890" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B4A60">
    Stock y movimientos
  </text>

  <text x="600" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5E6A7D">
    El frontend consume la API propia. El backend centraliza validaciones y lógica. PostgreSQL mantiene la persistencia de datos.
  </text>
</svg>
